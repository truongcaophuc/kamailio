; ============ Asterisk PJSIP Configuration ============
; Trunk to Kamailio SIP Proxy

; --- Transport ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; --- Outbound Auth (Asterisk → Kamailio) ---
[kamailio-auth]
type=auth
auth_type=userpass
username=asterisk
password=asterisk123

; --- Kamailio Trunk ---
[kamailio]
type=endpoint
transport=transport-udp
context=from-kamailio
disallow=all
allow=ulaw
allow=alaw
allow=opus
allow=g722
aors=kamailio
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
from_user=asterisk
from_domain=localhost
outbound_auth=kamailio-auth

[kamailio]
type=aor
contact=sip:kamailio:5060
qualify_frequency=30

[kamailio]
type=identify
endpoint=kamailio
match=172.16.0.0/12
match=192.168.0.0/16
match=10.0.0.0/8
