; ============ Asterisk Dialplan ============
; Handle calls from Kamailio

[general]
static=yes
writeprotect=no

[globals]

; --- Calls from Kamailio ---
[from-kamailio]

; Extension 9000: Answer and play demo message
exten => 9000,1,Answer()
 same => n,Playback(hello-world)
 same => n,Wait(1)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; Extension 9001: Echo test (hear your own voice)
exten => 9001,1,Answer()
 same => n,Echo()

; Extension 9002: Music on hold demo
exten => 9002,1,Answer()
 same => n,MusicOnHold(default,30)
 same => n,Hangup()

; Extension 9100: IVR Menu (Tong dai)
; Goi 9100 -> Nghe huong dan -> Bam phim chuyen tiep
; Bam 1 = Phong Nhan su (HR)     -> chuyen toi 1001
; Bam 2 = Phong Kinh doanh (Sales) -> chuyen toi 1002
; Bam 3 = Ho tro ky thuat (Support) -> chuyen toi 1003
; Bam * = Nghe lai huong dan
exten => 9100,1,Answer()
 same => n,Wait(1)
 same => n,Goto(ivr-main,s,1)

; Catch-all: play invalid extension message
exten => _X.,1,Answer()
 same => n,Playback(pbx-invalid)
 same => n,Hangup()

; ============ IVR Menu Context ============
; Background() plays audio while listening for DTMF simultaneously
; When caller presses a digit, Asterisk jumps to that extension
;
; To use custom Vietnamese audio:
;   1. Record your greeting as ivr-greeting.wav (16-bit, 8kHz, mono)
;   2. Convert: sox ivr-greeting.wav -r 8000 -c 1 -t ul ivr-greeting.ulaw
;   3. Place in /var/lib/asterisk/sounds/custom/
;   4. Replace "hello-world" below with "custom/ivr-greeting"

[ivr-main]
exten => s,1,Set(TIMEOUT(response)=10)
 same => n,Set(TIMEOUT(digit)=3)
 same => n(menu),Background(custom/ivr-greeting)
 same => n,WaitExten(5)

; Press 1: Phong Nhan su (HR) -> forward to 1001
exten => 1,1,NoOp(IVR: Caller ${CALLERID(num)} pressed 1 -> HR 1001)
 same => n,Dial(PJSIP/1001@kamailio,30,r)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; Press 2: Phong Kinh doanh (Sales) -> forward to 1002
exten => 2,1,NoOp(IVR: Caller ${CALLERID(num)} pressed 2 -> Sales 1002)
 same => n,Dial(PJSIP/1002@kamailio,30,r)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; Press 3: Ho tro ky thuat (Support) -> forward to 1003
exten => 3,1,NoOp(IVR: Caller ${CALLERID(num)} pressed 3 -> Support 1003)
 same => n,Dial(PJSIP/1003@kamailio,30,r)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; Press *: Nghe lai huong dan (replay menu)
exten => *,1,NoOp(IVR: Caller ${CALLERID(num)} pressed * -> Replay menu)
 same => n,Goto(s,menu)

; Invalid key pressed
exten => i,1,Playback(pbx-invalid)
 same => n,Goto(s,menu)

; Timeout - no key pressed
exten => t,1,Playback(vm-goodbye)
 same => n,Hangup()
